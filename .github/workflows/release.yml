name: Release
on:
  push:
    tags: ["v*"]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Restore dependencies
        run: dotnet restore
      - name: Download Godot Headless
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_mono_linux_headless_x86_64.zip
          unzip Godot_v4.5.1-stable_mono_linux_headless_x86_64.zip
          chmod +x Godot_v4.5.1-stable_mono_linux_headless_x86_64
      - name: Publish
        run: dotnet publish -c Release --no-restore
        env:
          GodotPath: ${{ github.workspace }}/Godot_v4.5.1-stable_mono_linux_headless_x86_64
          ModsPath: ${{ github.workspace }}/mods_output
      - name: Package Release Artifacts
        run: |
          cd mods_output/LittleWizard
          zip -r ../../LittleWizard-v${{ steps.version.outputs.version }}.zip .
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: LittleWizard-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
